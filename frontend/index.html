<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GameFi DAO</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #0f0f0f; color: #eee; padding: 2rem; }
    h1 { margin-bottom: 1.5rem; }
    h2 { margin: 1.5rem 0 0.75rem; color: #a78bfa; }
    button {
      background: #7c3aed; color: white; border: none;
      padding: 10px 20px; border-radius: 8px;
      cursor: pointer; margin: 5px 5px 5px 0; font-size: 0.95rem;
    }
    button:hover { background: #6d28d9; }
    button:disabled { background: #3a3a3a; cursor: not-allowed; color: #888; }
    input {
      background: #1f1f1f; border: 1px solid #3a3a3a; color: #eee;
      padding: 8px 12px; border-radius: 6px; font-size: 0.95rem;
      margin: 4px 4px 4px 0; width: 300px;
    }
    .card {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 10px; padding: 1.2rem; margin: 0.75rem 0;
    }
    .status {
      padding: 0.75rem 1rem; border-radius: 8px;
      margin: 0.5rem 0; font-size: 0.9rem; display: none;
    }
    .error { background: #2d1b1b; color: #f87171; display: block; }
    .success { background: #1b2d1b; color: #4ade80; display: block; }
    .info { background: #1b1f2d; color: #60a5fa; display: block; }
    .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 6px 0; }
    .label { color: #888; font-size: 0.85rem; min-width: 120px; }
    .value { color: #eee; font-size: 0.9rem; }
    .proposal-item {
      background: #111; border: 1px solid #2a2a2a;
      border-radius: 8px; padding: 1rem; margin: 0.5rem 0;
    }
    .badge {
      display: inline-block; padding: 2px 10px; border-radius: 20px;
      font-size: 0.78rem; font-weight: bold; margin-left: 8px;
    }
    .badge-active { background: #1b2d1b; color: #4ade80; }
    .badge-pending { background: #2d2d1b; color: #fbbf24; }
    .badge-executed { background: #1b1b2d; color: #818cf8; }
    .badge-queued { background: #2d1b2d; color: #c084fc; }
    #wallet-section { display: none; }
  </style>
</head>
<body>
  <h1>🎮 GameFi DAO</h1>

  <div class="card">
    <button id="connectBtn">Connect MetaMask</button>
    <div id="connect-status" class="status"></div>
    <div id="wallet-section">
      <div class="row"><span class="label">Address</span><span class="value" id="walletAddr">-</span></div>
      <div class="row"><span class="label">ETH Balance</span><span class="value" id="ethBalance">-</span></div>
      <div class="row"><span class="label">GAME Balance</span><span class="value" id="gameBalance">-</span></div>
      <div class="row"><span class="label">Voting Power</span><span class="value" id="votingPower">-</span></div>
    </div>
  </div>

  <h2>🗳️ Delegate Votes</h2>
  <div class="card">
    <div class="row">
      <input id="delegateAddr" placeholder="Address to delegate to" />
      <button id="delegateBtn" disabled>Delegate</button>
    </div>
    <div id="delegate-status" class="status"></div>
  </div>

  <h2>📋 Proposals</h2>
  <div class="card">
    <button id="loadProposalsBtn" disabled>Load Proposals from Subgraph</button>
    <div id="proposals-status" class="status"></div>
    <div id="proposals-list"></div>
  </div>

  <h2>➕ Create Proposal</h2>
  <div class="card">
    <div class="row">
      <input id="proposalDesc" placeholder="Proposal description" style="width:400px" />
    </div>
    <button id="proposeBtn" disabled>Create Proposal</button>
    <div id="propose-status" class="status"></div>
  </div>

  <h2>💰 Stake (Vault)</h2>
  <div class="card">
    <div class="row">
      <input id="stakeAmount" placeholder="Amount to stake" type="number" />
      <button id="stakeBtn" disabled>Stake</button>
    </div>
    <div id="stake-status" class="status"></div>
  </div>

  <h2>🎁 Open Lootbox</h2>
  <div class="card">
    <button id="lootboxBtn" disabled>Open Lootbox</button>
    <div id="lootbox-status" class="status"></div>
  </div>

  <h2>🔨 Craft Item</h2>
  <div class="card">
    <div class="row">
      <input id="recipeId" placeholder="Recipe ID" type="number" style="width:150px" />
      <button id="craftBtn" disabled>Craft</button>
    </div>
    <div id="craft-status" class="status"></div>
  </div>

  <h2>🔄 Swap Resources</h2>
  <div class="card">
    <div class="row">
      <input id="swapAmountIn" placeholder="Amount in" type="number" style="width:150px" />
      <button id="swapBtn" disabled>Swap</button>
    </div>
    <div id="swap-status" class="status"></div>
  </div>

  <script>
    const REQUIRED_CHAIN_ID = "0x14a34";
    const SUBGRAPH_URL = "https://api.studio.thegraph.com/query/YOUR_ID/gamefi-dao/version/latest";

    const TOKEN_ADDRESS = "0x0000000000000000000000000000000000000000";
    const GOVERNOR_ADDRESS = "0x0000000000000000000000000000000000000000";
    const VAULT_ADDRESS = "0x0000000000000000000000000000000000000000";
    const LOOTBOX_ADDRESS = "0x0000000000000000000000000000000000000000";
    const CRAFTING_ADDRESS = "0x0000000000000000000000000000000000000000";
    const AMM_ADDRESS = "0x0000000000000000000000000000000000000000";

    const TOKEN_ABI = [
      "function balanceOf(address) view returns (uint256)",
      "function getVotes(address) view returns (uint256)",
      "function delegate(address delegatee)",
      "function approve(address spender, uint256 amount) returns (bool)"
    ];

    const GOVERNOR_ABI = [
      "function propose(address[] targets, uint256[] values, bytes[] calldatas, string description) returns (uint256)",
      "function castVote(uint256 proposalId, uint8 support) returns (uint256)",
      "function state(uint256 proposalId) view returns (uint8)"
    ];

    const VAULT_ABI = [
      "function deposit(uint256 assets, address receiver) returns (uint256)"
    ];

    const LOOTBOX_ABI = [
      "function openLootbox() external"
    ];

    const CRAFTING_ABI = [
      "function craft(uint256 recipeId) external"
    ];

    const AMM_ABI = [
      "function swap(uint256 amountIn, uint256 minAmountOut, bool zeroForOne) external returns (uint256)"
    ];

    let provider, signer, userAddress;
    let tokenContract, governorContract, vaultContract;
    let lootboxContract, craftingContract, ammContract;

    function setStatus(id, msg, type) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.className = "status " + type;
    }

    async function loadWalletInfo() {
      const balance = await provider.getBalance(userAddress);
      const gameBalance = await tokenContract.balanceOf(userAddress);
      const votes = await tokenContract.getVotes(userAddress);

      document.getElementById("walletAddr").textContent = userAddress;
      document.getElementById("ethBalance").textContent =
        parseFloat(ethers.formatEther(balance)).toFixed(4) + " ETH";
      document.getElementById("gameBalance").textContent =
        parseFloat(ethers.formatEther(gameBalance)).toFixed(2) + " GAME";
      document.getElementById("votingPower").textContent =
        parseFloat(ethers.formatEther(votes)).toFixed(2) + " GAME";
      document.getElementById("wallet-section").style.display = "block";
    }

    async function switchNetwork() {
      const chainId = await window.ethereum.request({ method: "eth_chainId" });
      if (chainId === REQUIRED_CHAIN_ID) return true;
      try {
        await window.ethereum.request({
          method: "wallet_switchEthereumChain",
          params: [{ chainId: REQUIRED_CHAIN_ID }],
        });
        return true;
      } catch (e) {
        if (e.code === 4902) {
          await window.ethereum.request({
            method: "wallet_addEthereumChain",
            params: [{
              chainId: REQUIRED_CHAIN_ID,
              chainName: "Base Sepolia",
              nativeCurrency: { name: "ETH", symbol: "ETH", decimals: 18 },
              rpcUrls: ["https://sepolia.base.org"],
              blockExplorerUrls: ["https://sepolia-explorer.base.org"],
            }],
          });
          return true;
        }
        return false;
      }
    }

    document.getElementById("connectBtn").addEventListener("click", async () => {
      if (!window.ethereum) {
        setStatus("connect-status", "MetaMask not found.", "error");
        return;
      }
      try {
        const ok = await switchNetwork();
        if (!ok) { setStatus("connect-status", "Switch to Base Sepolia.", "error"); return; }

        await window.ethereum.request({ method: "eth_requestAccounts" });
        provider = new ethers.BrowserProvider(window.ethereum);
        signer = await provider.getSigner();
        userAddress = await signer.getAddress();

        tokenContract = new ethers.Contract(TOKEN_ADDRESS, TOKEN_ABI, signer);
        governorContract = new ethers.Contract(GOVERNOR_ADDRESS, GOVERNOR_ABI, signer);
        vaultContract = new ethers.Contract(VAULT_ADDRESS, VAULT_ABI, signer);
        lootboxContract = new ethers.Contract(LOOTBOX_ADDRESS, LOOTBOX_ABI, signer);
        craftingContract = new ethers.Contract(CRAFTING_ADDRESS, CRAFTING_ABI, signer);
        ammContract = new ethers.Contract(AMM_ADDRESS, AMM_ABI, signer);

        await loadWalletInfo();
        setStatus("connect-status", "Connected successfully.", "success");
        document.getElementById("connectBtn").textContent = "Connected ✓";

        const btns = ["delegateBtn","loadProposalsBtn","proposeBtn","stakeBtn","lootboxBtn","craftBtn","swapBtn"];
        btns.forEach(id => document.getElementById(id).disabled = false);

        window.ethereum.on("accountsChanged", () => window.location.reload());
        window.ethereum.on("chainChanged", () => window.location.reload());
      } catch (e) {
        setStatus("connect-status", e.code === 4001 ? "Rejected by user." : e.message, "error");
      }
    });

    document.getElementById("delegateBtn").addEventListener("click", async () => {
      const addr = document.getElementById("delegateAddr").value.trim();
      if (!addr) { setStatus("delegate-status", "Enter an address.", "error"); return; }
      try {
        setStatus("delegate-status", "Sending transaction...", "info");
        const tx = await tokenContract.delegate(addr);
        await tx.wait();
        await loadWalletInfo();
        setStatus("delegate-status", "Delegated successfully.", "success");
      } catch (e) {
        setStatus("delegate-status", e.message, "error");
      }
    });

    document.getElementById("loadProposalsBtn").addEventListener("click", async () => {
      setStatus("proposals-status", "Loading from subgraph...", "info");
      try {
        const query = `{
          proposals(first: 10, orderBy: createdAt, orderDirection: desc) {
            id proposalId description status
            forVotes againstVotes abstainVotes proposer
          }
        }`;
        const res = await fetch(SUBGRAPH_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query }),
        });
        const data = await res.json();
        const proposals = data.data?.proposals || [];

        const list = document.getElementById("proposals-list");
        if (proposals.length === 0) {
          list.innerHTML = "<p style='color:#888;margin-top:8px'>No proposals found.</p>";
          setStatus("proposals-status", "Done.", "success");
          return;
        }

        list.innerHTML = proposals.map(p => {
          const badgeClass = {
            Active: "badge-active", Pending: "badge-pending",
            Executed: "badge-executed", Queued: "badge-queued"
          }[p.status] || "badge-pending";

          return `
            <div class="proposal-item">
              <div><strong>#${p.proposalId}</strong>
                <span class="badge ${badgeClass}">${p.status}</span>
              </div>
              <div style="color:#aaa;font-size:0.85rem;margin:4px 0">${p.description}</div>
              <div style="font-size:0.82rem;color:#666">
                For: ${parseFloat(ethers.formatEther(p.forVotes || "0")).toFixed(0)} |
                Against: ${parseFloat(ethers.formatEther(p.againstVotes || "0")).toFixed(0)}
              </div>
              <div style="margin-top:6px">
                <button onclick="castVote('${p.proposalId}', 1)" style="padding:4px 12px;font-size:0.82rem">Vote For</button>
                <button onclick="castVote('${p.proposalId}', 0)" style="padding:4px 12px;font-size:0.82rem;background:#991b1b">Vote Against</button>
              </div>
            </div>`;
        }).join("");

        setStatus("proposals-status", `Loaded ${proposals.length} proposals.`, "success");
      } catch (e) {
        setStatus("proposals-status", "Failed to load: " + e.message, "error");
      }
    });

    window.castVote = async (proposalId, support) => {
      try {
        const tx = await governorContract.castVote(proposalId, support);
        await tx.wait();
        setStatus("proposals-status", "Vote cast successfully.", "success");
      } catch (e) {
        setStatus("proposals-status", e.message, "error");
      }
    };

    document.getElementById("proposeBtn").addEventListener("click", async () => {
      const desc = document.getElementById("proposalDesc").value.trim();
      if (!desc) { setStatus("propose-status", "Enter a description.", "error"); return; }
      try {
        setStatus("propose-status", "Creating proposal...", "info");
        const tx = await governorContract.propose(
          [ethers.ZeroAddress], [0], ["0x"], desc
        );
        const receipt = await tx.wait();
        setStatus("propose-status", "Proposal created! Tx: " + receipt.hash, "success");
      } catch (e) {
        setStatus("propose-status", e.message, "error");
      }
    });

    document.getElementById("stakeBtn").addEventListener("click", async () => {
      const amount = document.getElementById("stakeAmount").value;
      if (!amount || amount <= 0) { setStatus("stake-status", "Enter amount.", "error"); return; }
      try {
        setStatus("stake-status", "Approving...", "info");
        const parsed = ethers.parseEther(amount);
        const approveTx = await tokenContract.approve(VAULT_ADDRESS, parsed);
        await approveTx.wait();
        setStatus("stake-status", "Staking...", "info");
        const tx = await vaultContract.deposit(parsed, userAddress);
        await tx.wait();
        setStatus("stake-status", "Staked successfully.", "success");
      } catch (e) {
        setStatus("stake-status", e.message, "error");
      }
    });

    document.getElementById("lootboxBtn").addEventListener("click", async () => {
      try {
        setStatus("lootbox-status", "Opening lootbox...", "info");
        const tx = await lootboxContract.openLootbox();
        await tx.wait();
        setStatus("lootbox-status", "Lootbox opened!", "success");
      } catch (e) {
        setStatus("lootbox-status", e.message, "error");
      }
    });

    document.getElementById("craftBtn").addEventListener("click", async () => {
      const recipeId = document.getElementById("recipeId").value;
      if (!recipeId) { setStatus("craft-status", "Enter recipe ID.", "error"); return; }
      try {
        setStatus("craft-status", "Crafting...", "info");
        const tx = await craftingContract.craft(recipeId);
        await tx.wait();
        setStatus("craft-status", "Item crafted!", "success");
      } catch (e) {
        setStatus("craft-status", e.message, "error");
      }
    });

    document.getElementById("swapBtn").addEventListener("click", async () => {
      const amountIn = document.getElementById("swapAmountIn").value;
      if (!amountIn || amountIn <= 0) { setStatus("swap-status", "Enter amount.", "error"); return; }
      try {
        setStatus("swap-status", "Swapping...", "info");
        const parsed = ethers.parseEther(amountIn);
        const tx = await ammContract.swap(parsed, 0, true);
        await tx.wait();
        setStatus("swap-status", "Swap done!", "success");
      } catch (e) {
        setStatus("swap-status", e.message, "error");
      }
    });
  </script>
</body>
</html>
